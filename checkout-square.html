<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Simple Scents</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .checkout-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 26px;
      border-bottom: 1px solid #222;
    }
    .checkout-back {
      color: white;
      text-decoration: none;
      font-size: 22px;
      font-weight: 700;
    }
    .checkout-brand {
      color: white;
      text-decoration: none;
      font-size: 28px;
      font-weight: 800;
    }
    .checkout-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    #orderTotal {
      font-size: 20px;
      font-weight: 700;
      white-space: nowrap;
    }
    .checkout-input {
      width: 100%;
      max-width: 360px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-top: 6px;
      font-size: 16px;
    }
    label {
      display: block;
      margin-top: 16px;
      font-size: 20px;
    }
    button {
      margin-top: 22px;
      padding: 12px 22px;
      border-radius: 14px;
      font-size: 18px;
      cursor: pointer;
    }
    .checkout-summary {
      margin-top: 22px;
      margin-bottom: 0;
      padding: 14px 18px;
      border: 1px solid #333;
      border-radius: 12px;
      max-width: 360px;
      font-size: 18px;
      line-height: 1.55;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }
    .summary-total {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #333;
      font-weight: 800;
    }
    .checkout-summary span {
      float: none;
      margin-left: 12px;
      text-align: right;
      white-space: nowrap;
    }
    #checkoutStatus {
      margin-top: 10px;
      max-width: 360px;
      font-size: 16px;
      line-height: 1.35;
      color: #f5f5f5;
    }

  </style>
</head>
<body>
  <header class="checkout-header">
    <a class="checkout-back" href="index.html">← Back</a>
    <a class="checkout-brand" href="index.html">Simple Scents</a>
  </header>

  <main class="product-page">
    <div class="checkout-top">
      <h1>Checkout</h1>
    </div>

    <form id="checkoutForm">
      <label>Email</label>
      <input id="email" name="email" type="email" class="checkout-input">

      <div style="text-align:center;font-size:24px;font-weight:bold;margin:10px 0;">OR</div>

      <label>Phone Number</label>
      <input id="phone" name="phone" type="tel" inputmode="numeric" placeholder="10 digits" class="checkout-input">

      <label>First Name</label>
      <input id="firstName" name="firstName" type="text" required class="checkout-input">

      <label>Last Name</label>
      <input id="lastName" name="lastName" type="text" required class="checkout-input">

      <label>Address Number</label>
      <input id="address" name="address" type="text" required class="checkout-input">

      <label>Street Name</label>
      <input id="street" name="street" type="text" required class="checkout-input">

      <label>City</label>
      <input id="city" name="city" type="text" required class="checkout-input">

      <label>State (2 letters)</label>
      <input id="state" name="state" type="text" maxlength="2" required class="checkout-input">

      <label>ZIP Code</label>
      <input id="zip" name="zip" type="text" inputmode="numeric" maxlength="5" required class="checkout-input">

      <div id="checkoutSummary" class="checkout-summary">
        <div class="summary-row">Subtotal: <span id="subtotalDisplay">$0.00</span></div>
        <div class="summary-row">Shipping: <span id="shippingDisplay">$0.00</span></div>
        <div class="summary-row">Estimated Tax (8.25%): <span id="taxDisplay">$0.00</span></div>
        <div id="orderTotal" class="summary-row summary-total">Total: <span id="totalDisplay">$0.00</span></div>
      </div>

      <button type="submit" id="payNowButton">Pay Now</button>
      <div id="checkoutStatus">Press Pay Now after filling out the form.</div>
    </form>
  </main>

  <script>
    const FORMSPREE_URL = "https://formspree.io/f/mdavngdy";
    const SHIPPING_FEE = 6.00;

    const SQUARE_LINKS = [
      { keys: ['prada luna rossa ocean', 'prada ocean'], one: 'https://square.link/u/buPnGvip', two: 'https://square.link/u/yZkcB0i8' },
      { keys: ['acqua di gio profondo edp', 'acqua di gio profondo', 'aqua di gio profondo', 'aqua de gio profondo', 'acqua geo profondo', 'aqua geo profondo'], one: 'https://square.link/u/pDDGO7sW', two: 'https://square.link/u/wAd4l8UD' },
      { keys: ['afnan 9pm', '9pm'], one: 'https://square.link/u/6KWNznZY', two: 'https://square.link/u/cBtv4SZA' },
      { keys: ['armaf ventana pour homme', 'armaf ventana'], one: 'https://square.link/u/Nm5h7bZJ', two: 'https://square.link/u/AcU2KGAr' },
      { keys: ['aromatic citrus pour homme', 'aromatic citrus'], one: 'https://square.link/u/crwt7B6A', two: 'https://square.link/u/IMkUI9GB' },
      { keys: ['cremo spice black vanilla', 'cremo spice and black vanilla', 'cremo spice & black vanilla'], one: 'https://square.link/u/OVkHLAQP', two: 'https://square.link/u/QgmcQcdk' },
      { keys: ['guess seductive homme'], one: 'https://square.link/u/dqLsq39O', two: 'https://square.link/u/mWEmMUUj' },
      { keys: ['invictus edt', 'invictus'], one: 'https://square.link/u/6IYkEL6D', two: 'https://square.link/u/gc8eDcmp' },
      { keys: ['jpg le beau edt', 'jpg le beau'], one: 'https://square.link/u/pSJSc6Up', two: 'https://square.link/u/aqT1NUxy' },
      { keys: ['jpg le male le parfum'], one: 'https://square.link/u/B0UfEWG3', two: 'https://square.link/u/erbxB7aj' },
      { keys: ['jpg le male edt'], one: 'https://square.link/u/forYE1pR', two: 'https://square.link/u/V5Sg8NHV' },
      { keys: ['mancera instant crush', 'instant crush'], one: 'https://square.link/u/ynoh8sUM', two: 'https://square.link/u/WQFo5fzE' },
      { keys: ['nautica voyage'], one: 'https://square.link/u/grdqe0bB', two: 'https://square.link/u/9PDmNgnx' },
      { keys: ['pacific rock moss', 'goldfield banks pacific rock moss'], one: 'https://square.link/u/ObsdJ1PE', two: 'https://square.link/u/Coqo3qps' },
      { keys: ['paco rabanne 1 million edt', '1 million edt', 'one million'], one: 'https://square.link/u/tlrbQisJ', two: 'https://square.link/u/6NVnCXkp' },
      { keys: ['versace eros flame', 'eros flame'], one: 'https://square.link/u/wF47g4Dx', two: 'https://square.link/u/zM75zY0e' },
      { keys: ['fresh discovery pack'], one: 'https://square.link/u/EZXRgT5G', two: 'https://square.link/u/EZXRgT5G' },
      { keys: ['ysl myslf edp', 'ysl myself edp', 'ysl myself'], one: 'https://square.link/u/5YT3Iv35', two: 'https://square.link/u/kDzc3ExJ' }
    ];

    function clean(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/&/g, ' and ')
        .replace(/[^a-z0-9 ]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }



    function normalizeSquareUrl(url) {
      url = String(url || '').trim();
      if (!url) return '';
      if (/^https?:\/\//i.test(url)) return url;
      if (url.startsWith('square.link/u/')) return 'https://' + url;
      if (url.startsWith('/u/')) return 'https://square.link' + url;
      if (url.startsWith('u/')) return 'https://square.link/' + url;
      if (/^[A-Za-z0-9]+$/.test(url)) return 'https://square.link/u/' + url;
      return 'https://square.link/u/' + url.replace(/^\/+/, '');
    }

    function simpleScentsCorrectPrice(item) {
      return parseFloat(String(item.price || "0").replace(/[^0-9.]/g, "")) || 0;
    }

    function squareLinkForItem(item) {
      const name = clean(item.name || '');
      const size = clean(item.size || '2ml');
      const saved = clean(item.squareUrl || '');

      // Hard fix for Acqua/Aqua Di Gio Profondo 2 mL: never use the bare code by itself.
      if ((name.includes('acqua') || name.includes('aqua')) && name.includes('gio') && name.includes('profondo')) {
        const isOneMl = size.includes('1 ml') || size.includes('1ml');
        return isOneMl ? 'https://square.link/u/pDDGO7sW' : 'https://square.link/u/wAd4l8UD';
      }
      if (saved === 'wad4i8ud') return 'https://square.link/u/wAd4l8UD';

      const row = SQUARE_LINKS.find(r => r.keys.some(k => name.includes(clean(k)) || clean(k).includes(name)));
      if (!row) return normalizeSquareUrl(item.squareUrl || '');
      const isOneMl = size.includes('1 ml') || size.includes('1ml');
      return normalizeSquareUrl(isOneMl ? row.one : row.two);
    }

    function goToSquare(url) {
      const safeSquareUrl = normalizeSquareUrl(url);
      if (!/^https:\/\/square\.link\/u\//i.test(safeSquareUrl)) {
        alert('Square link is broken. Please try again.');
        return;
      }
      window.location.href = safeSquareUrl;
    }

    
    function fixOldAcquaSavedLink() {
      ["buyNowItem", "simpleScentsCart"].forEach(function(key) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return;
          const fixed = raw.replace(/"wAd4l8UD"/g, '"https://square.link/u/wAd4l8UD"');
          if (fixed !== raw) localStorage.setItem(key, fixed);
        } catch(e) {}
      });
    }
    fixOldAcquaSavedLink();

    const buyNowItem = JSON.parse(localStorage.getItem("buyNowItem") || "null");
    let checkoutItems = [];
    let subtotal = 0;

    if (buyNowItem) {
      checkoutItems = [{...buyNowItem, qty: 1}];
    } else {
      checkoutItems = JSON.parse(localStorage.getItem("simpleScentsCart") || "[]");
    }

    checkoutItems.forEach(item => {
      subtotal += simpleScentsCorrectPrice(item) * (item.qty || 1);
    });

    let shipping = checkoutItems.length ? SHIPPING_FEE : 0;
    let estimatedTax = subtotal * 0.0825;
    let finalTotal = subtotal + shipping + estimatedTax;

    function updateTotals() {
      shipping = checkoutItems.length ? SHIPPING_FEE : 0;
      estimatedTax = subtotal * 0.0825;
      finalTotal = subtotal + shipping + estimatedTax;
      document.getElementById("taxDisplay").textContent = "$" + estimatedTax.toFixed(2);
      document.getElementById("subtotalDisplay").textContent = "$" + subtotal.toFixed(2);
      document.getElementById("shippingDisplay").textContent = "$" + shipping.toFixed(2);
      document.getElementById("totalDisplay").textContent = "$" + finalTotal.toFixed(2);
    }

    updateTotals();

    function getValidatedOrderData() {
      updateTotals();

      if (!checkoutItems.length || subtotal <= 0) {
        alert("Your cart is empty. Add a fragrance before checkout.");
        return null;
      }

      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.replace(/\D/g, "");
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const address = document.getElementById("address").value.trim();
      const street = document.getElementById("street").value.trim();
      const city = document.getElementById("city").value.trim();
      const state = document.getElementById("state").value.trim().toUpperCase();
      const zip = document.getElementById("zip").value.trim();
      const VALID_STATES = ["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY","DC"];

      const hasEmail = email.length > 0;
      const hasPhone = phone.length > 0;

      if (!hasEmail && !hasPhone) {
        alert("Enter either an email or a phone number.");
        return null;
      }
      if (hasEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert("Enter a real email address, or leave email blank and use your phone number.");
        return null;
      }
      if (hasPhone && !/^\d{10}$/.test(phone)) {
        alert("Enter a real 10-digit phone number, or leave phone blank and use your email.");
        return null;
      }
      if (firstName.length < 2 || lastName.length < 2) {
        alert("Enter your real first and last name.");
        return null;
      }
      if (address.length < 1 || street.length < 3 || city.length < 2) {
        alert("Enter a real address, street name, and city.");
        return null;
      }
      if (!/^[A-Z]{2}$/.test(state) || !VALID_STATES.includes(state)) {
        alert("Enter a real U.S. state abbreviation (CA, TX, NY, etc.).");
        return null;
      }
      if (!/^\d{5}$/.test(zip)) {
        alert("Enter a real 5-digit ZIP code.");
        return null;
      }

      const orderItems = checkoutItems.map(item => {
        return `${item.name || "Item"} (${item.size || "sample"}) x${item.qty || 1} - $${simpleScentsCorrectPrice(item).toFixed(2)}`;
      }).join("\n");

      const paymentLinks = checkoutItems.map(item => squareLinkForItem(item)).filter(Boolean).join("\n");

      const orderData = {
        contactMethod: hasEmail && hasPhone ? "Email and phone" : hasEmail ? "Email" : "Phone",
        phone: hasPhone ? phone : "Not provided",
        firstName,
        lastName,
        addressNumber: address,
        streetName: street,
        city,
        state,
        zip,
        subtotal: "$" + subtotal.toFixed(2),
        shipping: "$" + shipping.toFixed(2),
        orderTotal: "$" + finalTotal.toFixed(2),
        orderItems,
        squarePaymentLink: paymentLinks,
        paymentStatus: "Order info sent to Formspree before redirecting to Square"
      };

      if (hasEmail) {
        orderData.email = email;
        orderData._replyto = email;
      }

      return orderData;
    }

    function sendOrderToFormspree(orderData) {
      const formData = new FormData();
      Object.keys(orderData).forEach(key => formData.append(key, orderData[key]));
      fetch(FORMSPREE_URL, {
        method: "POST",
        body: formData,
        headers: {"Accept":"application/json"},
        keepalive: true
      }).catch(() => {});
    }

    function lockCheckoutFields(locked) {
      document.querySelectorAll("#checkoutForm input").forEach(input => {
        input.readOnly = locked;
      });
      document.getElementById("payNowButton").disabled = locked;
    }

    function getCheckoutSquareUrl() {
      if (checkoutItems.length === 1 && (checkoutItems[0].qty || 1) === 1) {
        return squareLinkForItem(checkoutItems[0]);
      }
      return "";
    }

    document.getElementById("checkoutForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const orderData = getValidatedOrderData();
      if (!orderData) return;

      let squareUrl = getCheckoutSquareUrl();
      if (squareUrl === 'wAd4l8UD') squareUrl = 'https://square.link/u/wAd4l8UD';
      if (!squareUrl) {
        alert("This checkout can only redirect automatically to Square for one fragrance sample at a time. Remove extra items or quantities, then try again.");
        return;
      }

      try {
        lockCheckoutFields(true);
        document.getElementById("checkoutStatus").textContent = "Sending order info, then opening Square...";
        sendOrderToFormspree(orderData);
        localStorage.removeItem("buyNowItem");
        localStorage.removeItem("simpleScentsCart");
        localStorage.removeItem("checkoutMode");
        setTimeout(function() {
          goToSquare(squareUrl);
        }, 1200);
      } catch (error) {
        goToSquare(squareUrl);
      }
    });
  </script>
</body>
</html>
