<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cremo Spice & Black Vanilla</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 38px 18px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 44px;
      line-height: 1.1;
      margin: 0 0 24px;
      font-weight: 800;
    }

    .price {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 28px;
    }

    .description {
      font-size: 22px;
      line-height: 1.45;
      color: #cfcfcf;
      margin-bottom: 28px;
    }

    .carousel {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 12px;
    }

    .carousel img {
      flex: 0 0 86%;
      width: 86%;
      height: 360px;
      object-fit: cover;
      border-radius: 24px;
      scroll-snap-align: center;
      background: #111;
    }

    .hint {
      color: #aaa;
      font-size: 14px;
      margin-top: 8px;
      text-align: center;
    }

    a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <h1>Cremo Spice &amp;<br>Black Vanilla</h1>

  <div class="price">$3.99 • 2ml sample</div>

  <div class="description">
    Cardamom, cashmere woods, bourbon vanilla, dark spices, and warm sweetness.
  </div>

  <div class="carousel">
    <img src="cremo-spice-black-vanilla-handheld.jpg" alt="Cremo Spice & Black Vanilla handheld photo">
    <img src="cremo-spice-black-vanilla-close.jpg" alt="Cremo Spice & Black Vanilla close photo">
  </div>

  <div class="hint">Swipe sideways to see photos</div>

<script src="cart-buttons 2.js"></script><script src="cart-buttons-all-pages.js"></script>
</body>
</html>
