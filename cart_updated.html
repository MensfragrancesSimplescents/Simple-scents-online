<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Simple Scents</title>
  <style>
    body {
      margin: 0;
      padding: 28px 18px 120px;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 42px;
      margin: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .back {
      background: #fff;
      color: #000;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
    }

    .item {
      background: #111;
      border: 1px solid #262626;
      border-radius: 22px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 138px 54px;
      align-items: center;
      gap: 12px;
      min-height: 118px;
    }

    .cart-info {
      min-width: 0;
    }

    .item h2 {
      font-size: 22px;
      line-height: 1.15;
      margin: 0 0 10px;
      overflow-wrap: anywhere;
    }

    .item p {
      color: #cfcfcf;
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .qty-box{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      width:118px;
      justify-self:center;
      background:#111;
      border:1px solid #444;
      border-radius:15px;
      padding:6px 9px;
    }

    .qty-btn{
      width:31px;
      height:31px;
      border:none;
      border-radius:50%;
      background:#222;
      color:#fff;
      font-size:20px;
      font-weight:bold;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .qty-num{
      min-width:20px;
      text-align:center;
      font-weight:bold;
      font-size:20px;
    }

    .trash {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 999px;
      background: #e00000;
      color: #fff;
      font-size: 23px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      justify-self: end;
    }

    .trash:active {
      transform: scale(0.96);
      background: #b90000;
    }

    .empty {
      color: #bbb;
      font-size: 22px;
      line-height: 1.4;
      margin-top: 40px;
    }

    .bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,.94);
      border-top: 1px solid rgba(255,255,255,.14);
      padding: 14px 18px 24px;
    }

    .checkout {
      width: 100%;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #000;
      font-size: 20px;
      font-weight: 900;
      padding: 17px;
    }

    .clear {
      width: 100%;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      background: #222;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      padding: 14px;
      margin-top: 10px;
    }

    @media (max-width: 430px) {
      body { padding-left: 16px; padding-right: 16px; }
      .cart-item {
        grid-template-columns: minmax(0, 1fr) 126px 50px;
        gap: 8px;
        min-height: 112px;
        padding: 14px 16px;
      }
      .item h2 { font-size: 21px; }
      .item p { font-size: 17px; }
      .qty-box { width: 108px; padding: 5px 8px; }
      .qty-btn { width: 29px; height: 29px; font-size: 19px; }
      .trash { width: 48px; height: 48px; }
    }

    @media (max-width: 370px) {
      .cart-item { grid-template-columns: minmax(0, 1fr) 112px 46px; gap: 6px; }
      .item h2 { font-size: 19px; }
      .item p { font-size: 16px; }
      .qty-box { width: 98px; }
      .qty-btn { width: 27px; height: 27px; }
      .trash { width: 44px; height: 44px; }
    }
  </style>
</head>
<body>
  <div class="top">
    <div>
      <h1>Your Cart</h1>
      <p style="color:#bbb;font-size:18px;line-height:1.4;margin:12px 0 0;">
        Orders cannot be completed from the cart at this time.<br>
        Please use the Buy Now button on fragrance pages.
      </p>
    </div>
    <a class="back" href="index.html">Shop</a>
  </div>

  <div id="cart"></div>

  <div class="bottom">
    <button class="clear" onclick="clearCart()">Clear Cart</button>
  </div>

  <script>

function simpleScentsCorrectPrice(item) {
  return parseFloat(String(item.price || "0").replace(/[^0-9.]/g, "")) || 0;
}
function simpleScentsCorrectPriceText(item) {
  return "$" + simpleScentsCorrectPrice(item).toFixed(2);
}



    const cartBox = document.getElementById("cart");
    let cart = JSON.parse(localStorage.getItem("simpleScentsCart") || "[]");

    function sameProduct(a, b) {
      return String(a.name || "").trim().toLowerCase() === String(b.name || "").trim().toLowerCase()
        && String(a.size || "").trim().toLowerCase() === String(b.size || "").trim().toLowerCase();
    }

    function combineMatchingItems() {
      const combined = [];

      cart.forEach(item => {
        const qty = item.qty || 1;
        const match = combined.find(existing => sameProduct(existing, item));

        if (match) {
          match.qty = (match.qty || 1) + qty;
          match.price = item.price || match.price;
          match.size = item.size || match.size;
          match.page = item.page || match.page;
        } else {
          combined.push({ ...item, price: String(simpleScentsCorrectPrice(item).toFixed(2)), qty });
        }
      });

      cart = combined;
      localStorage.setItem("simpleScentsCart", JSON.stringify(cart));
    }

    combineMatchingItems();

    function renderCart() {
      if (!cart.length) {
        cartBox.innerHTML = '<div class="empty">Your cart is empty.<br>Go back to shop and add a fragrance sample.</div>';
        return;
      }

      let total = 0;
      cartBox.innerHTML = cart.map((item, index) => {
        const price = simpleScentsCorrectPrice(item);
        const qty = item.qty || 1;
        total += price * qty;
        return `
          <div class="item cart-item">
            <div class="cart-info">
              <h2>${item.name}</h2>
              <p>$${price.toFixed(2)} • ${item.size || "2ml sample"} • Qty: ${item.qty || 1}</p>
            </div>
            <div class="qty-box">
<button class="qty-btn" onclick="changeQty(${index},-1)">−</button>
<span class="qty-num">${item.qty || 1}</span>
<button class="qty-btn" onclick="changeQty(${index},1)">+</button>
</div>
<button class="trash" onclick="removeItem(${index})" aria-label="Remove ${item.name} from cart">🗑</button>
          </div>
        `;
      }).join("") + `
        <div class="item">
          <h2>Total</h2>
          <p>$${total.toFixed(2)}</p>
        </div>
      `;
    }

    function changeQty(index, amount) {
  cart[index].qty = Math.max(1, (cart[index].qty || 1) + amount);
  localStorage.setItem("simpleScentsCart", JSON.stringify(cart));
  renderCart();
}

function removeItem(index) {
      cart.splice(index, 1);
      localStorage.setItem("simpleScentsCart", JSON.stringify(cart));
      renderCart();
    }

    function clearCart() {
      localStorage.removeItem("simpleScentsCart");
      location.reload();
    }

    function checkout() {
      localStorage.setItem("checkoutMode", "cart");
      localStorage.removeItem("buyNowItem");
      window.location.href = "checkout-square.html";
    }

    renderCart();
  </script>
<script src="checkout-redirect.js"></script>
<script>
(function () {
  function getCartItems() {
    try {
      return JSON.parse(localStorage.getItem("simpleScentsCart") || "[]");
    } catch (e) {
      return [];
    }
  }

  function showEmptyCartPopup() {
    const old = document.getElementById("emptyCartPopup");
    if (old) old.remove();

    document.body.insertAdjacentHTML("beforeend", `
      <div id="emptyCartPopup" style="
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.65);
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:999999;
        padding:20px;">
        <div style="
          background:#111;
          color:white;
          border:1px solid #333;
          border-radius:18px;
          padding:22px;
          width:min(340px,90vw);
          box-shadow:0 10px 30px rgba(0,0,0,.45);
          font-family:Arial,sans-serif;">
          <div style="font-size:20px;line-height:1.35;margin-bottom:22px;">
            You do not have anything in your cart.
          </div>
          <div style="text-align:right;">
            <button type="button" onclick="document.getElementById('emptyCartPopup').remove()" style="
              background:white;
              color:black;
              border:none;
              border-radius:999px;
              padding:10px 18px;
              font-size:16px;
              font-weight:700;">
              Close
            </button>
          </div>
        </div>
      </div>
    `);
  }

  document.addEventListener("click", function (e) {
    const target = e.target.closest("a, button");
    if (!target) return;

    const text = (target.textContent || "").trim().toLowerCase();
    const href = (target.getAttribute("href") || "").toLowerCase();

    const isCheckout =
      text === "checkout" ||
      text.includes("checkout") ||
      href.includes("checkout-square.html");

    if (!isCheckout) return;

    const cart = getCartItems();
    if (!cart || cart.length === 0) {
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      showEmptyCartPopup();
      return false;
    }
  }, true);
})();
</script>

</body>
</html>
