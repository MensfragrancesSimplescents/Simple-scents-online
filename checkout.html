<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Checkout | Simple Scents</title><link rel="stylesheet" href="style.css"></head><body>
<header class="header"><a class="brand" href="index.html"><h1>Simple Scents</h1></a><div id="orderTotal" style="float:right;padding:10px;font-size:20px;">Total: $0.00</div></header>
<main class="product-page">
<h1>Checkout</h1>
<form action="https://formspree.io/f/mdavngdy" method="POST">
<label>Email</label><input id="email" type="email" required class="checkout-input"><br><br>
<label>Phone Number</label><input id="phone" type="tel" required class="checkout-input"><br><br>
<label>First Name</label><input required class="checkout-input"><br><br>
<label>Last Name</label><input required class="checkout-input"><br><br>
<label>Address Number</label><input id="address" required class="checkout-input"><br><br>
<label>Street Name</label><input id="street" required class="checkout-input"><br><br>
<label>City</label><input id="city" required class="checkout-input"><br><br>
<label>State (2 letters)</label><input id="state" required class="checkout-input"><br><br>
<label>ZIP Code</label><input id="zip" required class="checkout-input"><br><br>
<button type="submit">Pay with PayPal</button>
</form></main>
<script>
const cart=JSON.parse(localStorage.getItem('simpleScentsCart')||'[]');
let total=0; cart.forEach(i=>total+=(parseFloat(i.price)||0)*(i.qty||1));
document.getElementById('orderTotal').textContent='Total: $'+total.toFixed(2);
document.getElementById('checkoutForm').addEventListener('submit',e=>{
 
 const email=email.value.trim();
 const phone=document.getElementById('phone').value.replace(/\D/g,'');
 const zip=document.getElementById('zip').value.trim();
 const state=document.getElementById('state').value.trim();
 if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return alert('Enter a valid email');
 if(phone.length!==10) return alert('Enter a real 10-digit phone number');
 if(!/^\d{5}$/.test(zip)) return alert('Enter a valid ZIP code');
 if(!/^[A-Za-z]{2}$/.test(state)) return alert('Use 2-letter state code');
 window.location.href='https://www.paypal.com/';
});
</script></body></html>
