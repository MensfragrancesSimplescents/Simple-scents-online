<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Simple Scents</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .checkout-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 26px;
      border-bottom: 1px solid #222;
    }
    .checkout-back {
      color: white;
      text-decoration: none;
      font-size: 22px;
      font-weight: 700;
    }
    .checkout-brand {
      color: white;
      text-decoration: none;
      font-size: 28px;
      font-weight: 800;
    }
    .checkout-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    #orderTotal {
      font-size: 20px;
      font-weight: 700;
      white-space: nowrap;
    }
    .checkout-input {
      width: 100%;
      max-width: 360px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-top: 6px;
      font-size: 16px;
    }
    label {
      display: block;
      margin-top: 16px;
      font-size: 20px;
    }
    button {
      margin-top: 22px;
      padding: 12px 22px;
      border-radius: 14px;
      font-size: 18px;
      cursor: pointer;
    }
    .checkout-summary {
      margin-top: 22px;
      margin-bottom: 0;
      padding: 14px 18px;
      border: 1px solid #333;
      border-radius: 12px;
      max-width: 360px;
      font-size: 18px;
      line-height: 1.55;
    }
    .checkout-summary span {
      float: right;
      margin-left: 12px;
    }
    #paypal-button-container {
      margin-top: 18px;
      max-width: 360px;
    }
    #paypalStatus {
      margin-top: 10px;
      max-width: 360px;
      font-size: 16px;
      line-height: 1.35;
      color: #f5f5f5;
    }

  </style>
</head>
<body>
  <header class="checkout-header">
    <a class="checkout-back" href="javascript:history.back()">← Back</a>
    <a class="checkout-brand" href="index.html">Simple Scents</a>
  </header>

  <main class="product-page">
    <div class="checkout-top">
      <h1>Checkout</h1>
    </div>

    <form id="checkoutForm">
      <label>Email</label>
      <input id="email" name="email" type="email" class="checkout-input">

      <div style="text-align:center;font-size:24px;font-weight:bold;margin:10px 0;">OR</div>

      <label>Phone Number</label>
      <input id="phone" name="phone" type="tel" inputmode="numeric" placeholder="10 digits" class="checkout-input">

      <label>First Name</label>
      <input id="firstName" name="firstName" type="text" required class="checkout-input">

      <label>Last Name</label>
      <input id="lastName" name="lastName" type="text" required class="checkout-input">

      <label>Address Number</label>
      <input id="address" name="address" type="text" required class="checkout-input">

      <label>Street Name</label>
      <input id="street" name="street" type="text" required class="checkout-input">

      <label>City</label>
      <input id="city" name="city" type="text" required class="checkout-input">

      <label>State (2 letters)</label>
      <input id="state" name="state" type="text" maxlength="2" required class="checkout-input">

      <label>ZIP Code</label>
      <input id="zip" name="zip" type="text" inputmode="numeric" maxlength="5" required class="checkout-input">

      <div id="checkoutSummary" class="checkout-summary">
        <div>Subtotal: <span id="subtotalDisplay">$0.00</span></div>
        <div>Shipping: <span id="shippingDisplay">$0.00</span></div>
        <div>Estimated Tax (8.25%): <span id="taxDisplay">$0.00</span></div>
        <div id="orderTotal">Total: $0.00</div>
      </div>

      <button type="button" id="preparePayPalButton">Pay with PayPal</button>
      <div id="paypalStatus">Press Pay with PayPal after filling out the form. PayPal will charge the exact total shown above.</div>
      <div id="paypal-button-container"></div>
    </form>
  </main>

  <script src="https://www.paypal.com/sdk/js?client-id=ARsX-6VTijURUORZFdX7W9xT3k3R_zgG_ANDJOeuedWRVN3n1jYyF8Y4pofQzan5TYagx7F_su4HdSP2&currency=USD"></script>
  <script>

function simpleScentsCorrectPrice(item) {
  return parseFloat(String(item.price || "0").replace(/[^0-9.]/g, "")) || 0;
}
function simpleScentsCorrectPriceText(item) {
  return "$" + simpleScentsCorrectPrice(item).toFixed(2);
}



    const FORMSPREE_URL = "https://formspree.io/f/mdavngdy";
    let paypalButtonsRendered = false;
    let latestOrderData = null;

    const buyNowItem = JSON.parse(localStorage.getItem("buyNowItem") || "null");
    let checkoutItems = [];
    let total = 0;

    if (buyNowItem) {
      checkoutItems = [{...buyNowItem, qty: 1}];
      total = simpleScentsCorrectPrice(buyNowItem);
    } else {
      checkoutItems = JSON.parse(localStorage.getItem("simpleScentsCart") || "[]");
      checkoutItems.forEach(item => {
        total += (simpleScentsCorrectPrice(item)) * (item.qty || 1);
      });
    }

    const TAX_RATE = 0.0825;
    let shipping = 0;
    let estimatedTax = 0;
    let finalTotal = 0;
const stateField=document.getElementById("state");
function updateTotals(){
 const st=(stateField.value||"").trim().toUpperCase();
 shipping = st==="CA" ? 4.99 : (st.length===2 ? 6.99 : 0);
 estimatedTax = total * TAX_RATE;
 finalTotal = total + shipping + estimatedTax;
 document.getElementById("subtotalDisplay").textContent="$"+total.toFixed(2);
 document.getElementById("shippingDisplay").textContent="$"+shipping.toFixed(2);
 document.getElementById("taxDisplay").textContent="$"+estimatedTax.toFixed(2);
 document.getElementById("orderTotal").textContent="Total: $"+finalTotal.toFixed(2);
}
stateField.addEventListener("input", updateTotals);
updateTotals();

    function getValidatedOrderData() {
      updateTotals();

      if (!checkoutItems.length || total <= 0) {
        alert("Your cart is empty. Add a fragrance before checkout.");
        return null;
      }

      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.replace(/\D/g, "");
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const address = document.getElementById("address").value.trim();
      const street = document.getElementById("street").value.trim();
      const city = document.getElementById("city").value.trim();
      const state = document.getElementById("state").value.trim().toUpperCase();
      const zip = document.getElementById("zip").value.trim();
      const VALID_STATES = ["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY","DC"];

      const hasEmail = email.length > 0;
      const hasPhone = phone.length > 0;

      if (!hasEmail && !hasPhone) {
        alert("Enter either an email or a phone number.");
        return null;
      }
      if (hasEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert("Enter a real email address, or leave email blank and use your phone number.");
        return null;
      }
      if (hasPhone && !/^\d{10}$/.test(phone)) {
        alert("Enter a real 10-digit phone number, or leave phone blank and use your email.");
        return null;
      }
      if (firstName.length < 2 || lastName.length < 2) {
        alert("Enter your real first and last name.");
        return null;
      }
      if (address.length < 1 || street.length < 3 || city.length < 2) {
        alert("Enter a real address, street name, and city.");
        return null;
      }
      if (!/^[A-Z]{2}$/.test(state) || !VALID_STATES.includes(state)) {
        alert("Enter a real U.S. state abbreviation (CA, TX, NY, etc.).");
        return null;
      }
      if (!/^\d{5}$/.test(zip)) {
        alert("Enter a real 5-digit ZIP code.");
        return null;
      }

      const orderItems = checkoutItems.map(item => {
        return `${item.name || "Item"} (${item.size || "sample"}) x${item.qty || 1} - ${simpleScentsCorrectPriceText(item)}`;
      }).join("\n");

      const orderData = {
        contactMethod: hasEmail && hasPhone ? "Email and phone" : hasEmail ? "Email" : "Phone",
        phone: hasPhone ? phone : "Not provided",
        firstName,
        lastName,
        addressNumber: address,
        streetName: street,
        city,
        state,
        zip,
        subtotal: "$" + total.toFixed(2),
        shipping: "$" + shipping.toFixed(2),
        estimatedTax: "$" + estimatedTax.toFixed(2),
        orderTotal: "$" + finalTotal.toFixed(2),
        orderItems
      };

      if (hasEmail) {
        orderData.email = email;
        orderData._replyto = email;
      }

      return orderData;
    }

    async function sendOrderToFormspree(orderData) {
      const response = await fetch(FORMSPREE_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify(orderData)
      });

      if (!response.ok) {
        throw new Error("Formspree did not accept the order info.");
      }
    }

    function lockCheckoutFields(locked) {
      document.querySelectorAll("#checkoutForm input").forEach(input => {
        input.readOnly = locked;
      });
      document.getElementById("preparePayPalButton").disabled = locked;
    }

    function renderPayPalButtons() {
      if (paypalButtonsRendered) {
        document.getElementById("paypalStatus").textContent = "Use the PayPal button below. It will charge the exact total shown above.";
        return;
      }

      if (!window.paypal) {
        alert("PayPal did not load. Check your internet connection and try again.");
        return;
      }

      paypalButtonsRendered = true;
      document.getElementById("paypalStatus").textContent = "Use the PayPal button below. It will charge the exact total shown above.";

      paypal.Buttons({
        style: {
          layout: "vertical",
          color: "gold",
          shape: "rect",
          label: "paypal"
        },
        onClick: function(data, actions) {
          latestOrderData = getValidatedOrderData();
          if (!latestOrderData) {
            return actions.reject();
          }
          lockCheckoutFields(true);
          return actions.resolve();
        },
        createOrder: function(data, actions) {
          updateTotals();
          latestOrderData = getValidatedOrderData();
          if (!latestOrderData) {
            throw new Error("Checkout form is missing information.");
          }

          const exactTotal = finalTotal.toFixed(2);
          return actions.order.create({
            purchase_units: [{
              description: "Simple Scents Order",
              amount: {
                currency_code: "USD",
                value: exactTotal,
                breakdown: {
                  item_total: { currency_code: "USD", value: total.toFixed(2) },
                  shipping: { currency_code: "USD", value: shipping.toFixed(2) },
                  tax_total: { currency_code: "USD", value: estimatedTax.toFixed(2) }
                }
              }
            }]
          });
        },
        onCancel: function() {
          lockCheckoutFields(false);
          document.getElementById("paypalStatus").textContent = "Payment was cancelled. You can check your info and try again.";
        },
        onApprove: async function(data, actions) {
          try {
            const details = await actions.order.capture();
            const paidData = {
              ...latestOrderData,
              paypalOrderID: data.orderID,
              paypalPayerID: data.payerID || "",
              paypalStatus: details.status || "COMPLETED",
              paidAt: new Date().toISOString()
            };

            await sendOrderToFormspree(paidData);
            localStorage.removeItem("buyNowItem");
            localStorage.removeItem("simpleScentsCart");
            localStorage.removeItem("checkoutMode");
            alert("Payment complete. Thank you for your Simple Scents order!");
            window.location.href = "index.html";
          } catch (error) {
            alert("Payment may have gone through, but the order info did not send correctly. Screenshot this page and contact Simple Scents.");
            lockCheckoutFields(false);
          }
        },
        onError: function(err) {
          console.error(err);
          alert("PayPal had an error. Please try again.");
          lockCheckoutFields(false);
        }
      }).render("#paypal-button-container");
    }

    document.getElementById("checkoutForm").addEventListener("submit", function(e) {
      e.preventDefault();
    });

    document.getElementById("preparePayPalButton").addEventListener("click", function() {
      latestOrderData = getValidatedOrderData();
      if (!latestOrderData) return;
      renderPayPalButtons();
    });
  </script>
</body>
</html>
