<script>
document.addEventListener('DOMContentLoaded',()=>{
 const h=document.querySelector('p[style*="font-size:28px"]');
 const swipe=[...document.querySelectorAll('p')].find(p=>p.textContent.includes('Swipe'));
 if(!swipe) return;
 const box=document.createElement('div');
 box.innerHTML=`<div style="background:#000;border:1px solid #333;border-radius:20px;padding:20px;margin:20px 0;text-align:center">
 <h2>Choose sample size</h2>
 <div style="display:flex;gap:12px;justify-content:center">
 <button id="b1" style="background:white;color:black;padding:16px 24px;border-radius:18px;font-size:28px;font-weight:bold">1 mL · $4.99</button>
 <button id="b2" style="background:white;color:black;padding:16px 24px;border-radius:18px;font-size:28px;font-weight:bold">2 mL · $7.99</button>
 </div><p>Pick a size before buying or adding to cart.</p></div>`;
 swipe.after(box);
 document.getElementById('b1').onclick=()=>{h.textContent='$4.99 · 1ml sample';}
 document.getElementById('b2').onclick=()=>{h.textContent='$7.99 · 2ml sample';}
});
